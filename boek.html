<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boek nu | Skinnovation LAB — V1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&amp;family=Instrument+Sans:wght@300;400;500;600&amp;display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Instrument Sans', system_ui, sans-serif; }
        .heading-serif { font-family: 'Playfair Display', Georgia, serif; font-weight: 700; letter-spacing: -0.025em; }
        .premium-shadow { box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.08), 0 4px 6px -4px rgb(0 0 0 / 0.08); }
    </style>
</head>
<body class="bg-[#F8F5F2] dark:bg-[#1A1614] text-[#2C2522] dark:text-[#EDE9E3]">
    <nav class="bg-white/90 dark:bg-[#2C2522]/90 backdrop-blur-xl border-b border-[#EDE9E3] dark:border-[#3A3230] sticky top-0 z-50">
        <div class="max-w-screen-2xl mx-auto px-8 py-5 flex justify-between items-center">
            <div class="flex items-center gap-x-4">
                <div class="w-10 h-10 bg-[#2C2522] dark:bg-[#C9A26B] rounded-2xl flex items-center justify-center">
                    <span class="text-white dark:text-[#2C2522] font-bold text-2xl">S</span>
                </div>
                <div>
                    <span class="font-semibold text-3xl tracking-tight">Skinnovation</span>
                    <span class="text-[#C9A26B] font-light text-3xl">LAB</span>
                </div>
            </div>
            <div class="hidden md:flex items-center gap-x-10 text-[15px]">
                <a href="index.html" class="hover:text-[#C9A26B] transition-all font-medium">Home</a>
                <a href="over-ons.html" class="hover:text-[#C9A26B] transition-all font-medium">Over ons</a>
                <a href="behandelingen.html" class="hover:text-[#C9A26B] transition-all font-medium">Behandelingen</a>
                <a href="resultaten.html" class="hover:text-[#C9A26B] transition-all font-medium">Resultaten</a>
                <a href="contact.html" class="hover:text-[#C9A26B] transition-all font-medium">Contact</a>
            </div>
            <div class="flex items-center gap-x-3">
                <button id="dark-mode-toggle" class="w-11 h-11 flex items-center justify-center text-2xl hover:bg-[#EDE9E3] dark:hover:bg-[#3A3230] rounded-2xl transition-all">
                    <i class="fas fa-moon dark:hidden"></i>
                    <i class="fas fa-sun hidden dark:block"></i>
                </button>
            </div>
        </div>
    </nav>

    <div class="max-w-screen-2xl mx-auto px-8 py-16">
        <div class="max-w-2xl mx-auto">
            <div class="text-center mb-12">
                <div class="text-sm text-[#C9A26B] font-medium tracking-[1px] mb-4">V1</div>
                <h1 class="text-[64px] leading-none tracking-[-3px] heading-serif mb-6">Boek uw behandeling</h1>
                <p class="text-2xl text-[#5C5249] dark:text-[#B8B0A8]">Kies een behandeling en datum die u past.</p>
            </div>

            <div class="bg-white dark:bg-[#2C2522] rounded-3xl p-10 border border-[#EDE9E3] dark:border-[#3A3230] premium-shadow">
                <div class="mb-8">
                    <label class="block text-sm font-medium mb-3">Behandeling</label>
                    <select class="w-full border p-4 rounded-2xl bg-white dark:bg-[#2C2522]">
                        <option>HydraFacial — €149</option>
                        <option>Laser Permanente ontharing — €89</option>
                        <option>Vetbevriezing — €299</option>
                        <option>Emsculpt — €249</option>
                        <option>Microneedling RF — €179</option>
                    </select>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium mb-3">Kies een datum</label>
                        <input type="date" class="w-full border p-4 rounded-2xl bg-white dark:bg-[#2C2522]" value="2026-05-25">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-3">Kies een tijd</label>
                        <select class="w-full border p-4 rounded-2xl bg-white dark:bg-[#2C2522]">
                            <option>09:00 - 09:45</option>
                            <option>10:00 - 10:45</option>
                            <option>13:00 - 13:45</option>
                            <option>14:00 - 14:45</option>
                            <option>15:00 - 15:45</option>
                        </select>
                    </div>
                </div>

                <div class="mt-8">
                    <label class="block text-sm font-medium mb-3">Uw naam</label>
                    <input type="text" class="w-full border p-4 rounded-2xl bg-white dark:bg-[#2C2522]" placeholder="Voor- en achternaam">
                </div>

                <button onclick="bookAppointment()" class="mt-8 w-full py-4.5 bg-[#2C2522] dark:bg-[#C9A26B] text-white dark:text-[#2C2522] rounded-3xl font-semibold text-lg flex items-center justify-center gap-x-3 hover:bg-black dark:hover:bg-[#EDE9E3] transition-all">
                    <span>Bevestig afspraak</span>
                    <i class="fas fa-check"></i>
                </button>

                <p class="text-center text-xs text-[#5C5249] dark:text-[#B8B0A8] mt-4">We bevestigen uw afspraak binnen 24 uur via e-mail.</p>
            </div>
        </div>
    </div>

    <footer class="bg-[#2C2522] dark:bg-black text-white/80 py-10 mt-16">
        <div class="max-w-screen-2xl mx-auto px-8 text-center text-sm">
            Skinnovation LAB V1 • Malemstraat 1, 9000 Gent
        </div>
    </footer>

    <script>
        function bookAppointment() {
            alert('✅ Afspraak succesvol geboekt!\n\nWe sturen u een bevestigingsmail.');
        }

        const toggle = document.getElementById('dark-mode-toggle');
        const html = document.documentElement;
        if (localStorage.getItem('darkMode') === 'true' || (!('darkMode' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) html.classList.add('dark');
        toggle.addEventListener('click', () => { html.classList.toggle('dark'); localStorage.setItem('darkMode', html.classList.contains('dark')); });
    </script>
</body>
</html>
