<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boek nu | Skinnovation LAB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-[#F8F5F2] text-[#2C2522]">
    <nav class="bg-white border-b sticky top-0 z-50">
        <div class="max-w-screen-2xl mx-auto px-8 py-5 flex justify-between items-center">
            <div class="flex items-center gap-x-3">
                <div class="w-9 h-9 bg-[#2C2522] rounded-full flex items-center justify-center">
                    <span class="text-white font-bold text-xl">S</span>
                </div>
                <span class="font-semibold text-2xl">Skinnovation <span class="text-[#C9A26B]">LAB</span></span>
            </div>

            <div class="hidden md:flex items-center gap-x-8 text-sm">
                <a href="index.html" class="hover:text-[#C9A26B]">Home</a>
                <a href="over-ons.html" class="hover:text-[#C9A26B]">Over ons</a>
                <a href="behandelingen.html" class="hover:text-[#C9A26B]">Behandelingen</a>
                <a href="resultaten.html" class="hover:text-[#C9A26B]">Resultaten</a>
                <a href="contact.html" class="hover:text-[#C9A26B]">Contact</a>
            </div>

            <div class="md:hidden">
                <button id="mobile-menu-btn" class="w-10 h-10 flex items-center justify-center text-2xl">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
        </div>

        <div id="mobile-menu" class="hidden md:hidden bg-white border-t px-8 py-6">
            <div class="flex flex-col gap-y-4 text-lg">
                <a href="index.html" class="py-2 hover:text-[#C9A26B]">Home</a>
                <a href="over-ons.html" class="py-2 hover:text-[#C9A26B]">Over ons</a>
                <a href="behandelingen.html" class="py-2 hover:text-[#C9A26B]">Behandelingen</a>
                <a href="resultaten.html" class="py-2 hover:text-[#C9A26B]">Resultaten</a>
                <a href="contact.html" class="py-2 hover:text-[#C9A26B]">Contact</a>
            </div>
        </div>
    </nav>

    <div class="max-w-screen-2xl mx-auto px-8 py-16">
        <h1 class="text-5xl heading-serif">Boek uw behandeling</h1>
        <p class="mt-4">Kies een datum en tijd die u past.</p>
        
        <div class="mt-10 max-w-2xl">
            <div class="bg-white p-8 rounded-3xl border">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium mb-2">Kies een datum</label>
                        <input type="date" class="w-full border p-4 rounded-2xl" value="2026-05-25">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Kies een tijd</label>
                        <select class="w-full border p-4 rounded-2xl">
                            <option>09:00 - 09:45</option>
                            <option>10:00 - 10:45</option>
                            <option>13:00 - 13:45</option>
                            <option>14:00 - 14:45</option>
                        </select>
                    </div>
                </div>
                
                <div class="mt-6">
                    <label class="block text-sm font-medium mb-2">Behandeling</label>
                    <select class="w-full border p-4 rounded-2xl">
                        <option>Basis Vetbevriezing (1 zone) - €299</option>
                        <option>Duo Vetbevriezing (2 zones) - €499</option>
                        <option>Premium Pakket - €699</option>
                    </select>
                </div>
                
                <button onclick="alert('✅ Afspraak geboekt! We bevestigen binnen 24u.')" 
                        class="mt-8 w-full py-4 bg-[#2C2522] text-white rounded-2xl font-medium text-lg">
                    Bevestig afspraak
                </button>
            </div>
        </div>
    </div>

    <script>
        const mobileBtn = document.getElementById('mobile-menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        if (mobileBtn && mobileMenu) {
            mobileBtn.addEventListener('click', () => {
                mobileMenu.classList.toggle('hidden');
                const icon = mobileBtn.querySelector('i');
                icon.classList.toggle('fa-bars');
                icon.classList.toggle('fa-times');
            });
        }
    </script>
</body>
</html>
