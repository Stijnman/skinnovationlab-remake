<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boek nu | Skinnovation LAB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', system_ui, sans-serif; }
        .heading-serif { font-family: 'Playfair Display', Georgia, serif; font-weight: 700; }
    </style>
</head>
<body class="bg-[#F8F5F2] dark:bg-[#1A1614] text-[#2C2522] dark:text-[#EDE9E3]">
    <nav class="bg-white dark:bg-[#2C2522] border-b border-[#EDE9E3] dark:border-[#3A3230] sticky top-0 z-50">
        <div class="max-w-screen-2xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-x-3">
                <div class="w-9 h-9 bg-[#2C2522] dark:bg-[#C9A26B] rounded-full flex items-center justify-center">
                    <span class="text-white dark:text-[#2C2522] font-bold text-xl">S</span>
                </div>
                <span class="font-semibold text-2xl">Skinnovation <span class="text-[#C9A26B]">LAB</span></span>
            </div>

            <div class="hidden md:flex items-center gap-x-8 text-sm">
                <a href="index.html" class="hover:text-[#C9A26B]">Home</a>
                <a href="over-ons.html" class="hover:text-[#C9A26B]">Over ons</a>
                <a href="behandelingen.html" class="hover:text-[#C9A26B]">Behandelingen</a>
                <a href="resultaten.html" class="hover:text-[#C9A26B]">Resultaten</a>
                <a href="contact.html" class="hover:text-[#C9A26B]">Contact</a>
            </div>

            <div class="flex items-center gap-x-4">
                <button id="dark-mode-toggle" class="w-10 h-10 flex items-center justify-center text-xl hover:bg-[#EDE9E3] dark:hover:bg-[#3A3230] rounded-full">
                    <i class="fas fa-moon dark:hidden"></i>
                    <i class="fas fa-sun hidden dark:block"></i>
                </button>
                <div class="md:hidden">
                    <button id="mobile-menu-btn" class="w-10 h-10 flex items-center justify-center text-2xl">
                        <i class="fas fa-bars"></i>
                    </button>
                </div>
            </div>
        </div>

        <div id="mobile-menu" class="hidden md:hidden bg-white dark:bg-[#2C2522] border-t px-6 py-5">
            <div class="flex flex-col gap-y-4 text-lg">
                <a href="index.html" class="py-2">Home</a>
                <a href="over-ons.html" class="py-2">Over ons</a>
                <a href="behandelingen.html" class="py-2">Behandelingen</a>
                <a href="resultaten.html" class="py-2">Resultaten</a>
                <a href="contact.html" class="py-2">Contact</a>
                <a href="boek.html" class="mt-3 w-full text-center py-3 bg-[#2C2522] dark:bg-[#C9A26B] text-white dark:text-[#2C2522] rounded-2xl font-medium">Boek nu</a>
            </div>
        </div>
    </nav>

    <div class="max-w-screen-2xl mx-auto px-6 py-12">
        <div class="max-w-2xl mx-auto">
            <div class="text-center mb-10">
                <h1 class="text-5xl md:text-6xl heading-serif tracking-tighter">Boek uw behandeling</h1>
                <p class="mt-4 text-xl text-[#5C5249] dark:text-[#B8B0A8]">Kies een datum en tijd die u past.</p>
            </div>

            <div class="bg-white dark:bg-[#2C2522] rounded-3xl p-8 border border-[#EDE9E3] dark:border-[#3A3230] shadow-xl">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium mb-2">Kies een datum</label>
                        <input type="date" class="w-full border p-4 rounded-2xl bg-white dark:bg-[#2C2522]" value="2026-05-25">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Kies een tijd</label>
                        <select class="w-full border p-4 rounded-2xl bg-white dark:bg-[#2C2522]">
                            <option>09:00 - 09:45</option>
                            <option>10:00 - 10:45</option>
                            <option>13:00 - 13:45</option>
                            <option>14:00 - 14:45</option>
                        </select>
                    </div>
                </div>

                <div class="mt-6">
                    <label class="block text-sm font-medium mb-2">Behandeling</label>
                    <select class="w-full border p-4 rounded-2xl bg-white dark:bg-[#2C2522]">
                        <option>Basis Vetbevriezing (1 zone) - €299</option>
                        <option>Duo Vetbevriezing (2 zones) - €499</option>
                        <option>Premium Pakket (3 zones) - €699</option>
                    </select>
                </div>

                <div class="mt-6">
                    <label class="block text-sm font-medium mb-2">Uw naam</label>
                    <input type="text" class="w-full border p-4 rounded-2xl bg-white dark:bg-[#2C2522]" placeholder="Voor- en achternaam">
                </div>

                <button onclick="bookAppointment()" class="mt-8 w-full py-4 bg-[#2C2522] dark:bg-[#C9A26B] text-white dark:text-[#2C2522] rounded-2xl font-medium text-lg flex items-center justify-center gap-x-3 hover:bg-black dark:hover:bg-[#EDE9E3] transition-all">
                    <span>Bevestig afspraak</span>
                    <i class="fas fa-check"></i>
                </button>

                <p class="text-center text-xs text-[#5C5249] dark:text-[#B8B0A8] mt-4">We bevestigen uw afspraak binnen 24 uur via e-mail.</p>
            </div>
        </div>
    </div>

    <footer class="bg-[#2C2522] dark:bg-black text-white/80 py-10 mt-16">
        <div class="max-w-screen-2xl mx-auto px-6 text-center text-sm">
            © 2026 Skinnovation LAB • Leuvensesteenweg 250, 1000 Brussel
        </div>
    </footer>

    <script>
        function bookAppointment() {
            alert('✅ Afspraak succesvol geboekt!\n\nWe sturen u een bevestigingsmail.');
        }

        const toggle = document.getElementById('dark-mode-toggle');
        const html = document.documentElement;

        if (localStorage.getItem('darkMode') === 'true' || (!('darkMode' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            html.classList.add('dark');
        }

        toggle.addEventListener('click', () => {
            html.classList.toggle('dark');
            localStorage.setItem('darkMode', html.classList.contains('dark'));
        });

        const mobileBtn = document.getElementById('mobile-menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        if (mobileBtn && mobileMenu) {
            mobileBtn.addEventListener('click', () => {
                mobileMenu.classList.toggle('hidden');
            });
        }
    </script>
</body>
</html>
